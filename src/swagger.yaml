openapi: 3.0.0
info:
  title: Library API
  version: 1.0.0

servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /api/auth/signup:
    post:
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: Tasnim
              email: tasnim@test.com
              password: 123456
      responses:
        201:
          description: User created
        400:
          description: Missing fields
        409:
          description: Email already exists

  /api/auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: tasnim@test.com
              password: 123456
      responses:
        200:
          description: JWT token returned
          content:
            application/json:
              example:
                token: jwt_token_here
        401:
          description: Invalid credentials
  
  /api/books:
    post:
      summary: Create a book (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: Coraline
              isbn: "343434343"
              publishedYear: 2002
              copiesAvailable: 4
      responses:
        201:
          description: Book created
          content:
            application/json:
              example:
                id: 1
                title: Coraline
                isbn: "343434343"
                publishedYear: 2002
                copiesAvailable: 4
        400:
          description: Missing fields
        401:
          description: Unauthorized
        403:
          description: Forbidden

    get:
      summary: Get all books
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of books
          content:
            application/json:
              example:
                - id: 1
                  title: Coraline
                  isbn: "343434343"
                  publishedYear: 2002
                  copiesAvailable: 4
        401:
          description: Unauthorized

  /api/books/{id}:
    get:
      summary: Get book by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Book found
        401:
          description: Unauthorized
        404:
          description: Not found

    put:
      summary: Update book (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            example:
              copiesAvailable: 10
      responses:
        200:
          description: Updated
        400:
          description: Invalid input
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Not found

    delete:
      summary: Delete book (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Deleted
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Not found

  /api/authors:
    post:
      summary: Create a new author (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: Neil Gaiman
              bio: British author known for dark fantasy
      responses:
        201:
          description: Author created successfully
          content:
            application/json:
              example:
                id: 1
                name: Neil Gaiman
                bio: British author known for dark fantasy
        400:
          description: Missing required fields
        401:
          description: Unauthorized (no token)
        403:
          description: Forbidden (not admin)

    get:
      summary: Get all authors
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of authors
          content:
            application/json:
              example:
                - id: 1
                  name: Neil Gaiman
                  bio: British author known for dark fantasy
                - id: 2
                  name: J.K. Rowling
                  bio: Author of Harry Potter
        401:
          description: Unauthorized

  /api/authors/{id}:
    get:
      summary: Get author by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Author found
          content:
            application/json:
              example:
                id: 1
                name: Neil Gaiman
                bio: British author known for dark fantasy
        401:
          description: Unauthorized
        404:
          description: Author not found

    put:
      summary: Update author (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            example:
              bio: Updated author bio
      responses:
        200:
          description: Author updated
          content:
            application/json:
              example:
                id: 1
                name: Neil Gaiman
                bio: Updated author bio
        400:
          description: Invalid input
        401:
          description: Unauthorized
        403:
          description: Forbidden (not admin)
        404:
          description: Author not found

    delete:
      summary: Delete author (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Author deleted
          content:
            application/json:
              example:
                id: 1
                name: Neil Gaiman
                bio: British author known for dark fantasy
        401:
          description: Unauthorized
        403:
          description: Forbidden (not admin)
        404:
          description: Author not found

  /api/loans:
    post:
      summary: Borrow a book
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              bookId: 1
      responses:
        201:
          description: Loan created
          content:
            application/json:
              example:
                id: 1
                userId: 2
                bookId: 1
                loanDate: "2026-04-28T18:04:50.024Z"
                returnDate: null
                status: borrowed
        400:
          description: Book not available
        401:
          description: Unauthorized
        404:
          description: Book not found

    get:
      summary: Get all loans (Admin only)
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of loans
        401:
          description: Unauthorized
        403:
          description: Forbidden

  /api/loans/{id}:
    get:
      summary: Get loan by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Loan found
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Not found

    put:
      summary: Return a book (Admin only)
      requestBody:
        required: false
        content:
          application/json:
            example: {}
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Loan updated
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Not found

    delete:
      summary: Delete a loan (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Deleted
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Not found